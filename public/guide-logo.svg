<svg xmlns="http://www.w3.org/2000/svg" width="260" height="120" viewBox="0 0 260 120">
  <defs>
    <pattern id="stripes" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(-25)">
      <rect width="22" height="22" fill="#edf1f8"/>
      <rect width="9" height="22" fill="rgba(44,68,150,0.14)"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="260" height="120" fill="#edf1f8"/>
  <rect x="0" y="0" width="260" height="120" fill="url(#stripes)" opacity="0.85"/>
  <g filter="url(#softShadow)">
    <text x="86" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="900" fill="#26359a" letter-spacing="0.5">ALE</text>
    <text x="128" y="42" text-anchor="middle" font-family="Arial" font-size="30" font-weight="900" fill="#cc2222" letter-spacing="0.5">X</text>
  </g>
  <g transform="translate(98 82) rotate(-10)">
    <text x="0" y="0" font-family="Times-Roman" font-style="italic" font-size="26" font-weight="700" fill="#171717">channel</text>
  </g>
  <g transform="translate(118 106) rotate(-9)">
    <text x="0" y="0" font-family="Times-Roman" font-style="italic" font-size="40" font-weight="700" fill="#101010">Guide</text>
  </g>
</svg>
